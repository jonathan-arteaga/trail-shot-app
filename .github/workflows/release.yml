name: Release DMG

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build release DMG
    runs-on: macos-14

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release_tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Test
        run: swift test

      - name: Package DMG
        run: ./script/package_dmg.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrailShot-${{ steps.release_tag.outputs.tag }}-dmg
          path: dist/TrailShot.dmg
          if-no-files-found: error

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/TrailShot.dmg --clobber
          else
            gh release create "$RELEASE_TAG" dist/TrailShot.dmg \
              --title "TrailShot $RELEASE_TAG" \
              --generate-notes
          fi
