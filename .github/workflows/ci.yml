name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-and-package:
    name: Test and package
    runs-on: macos-14

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Test
        run: swift test

      - name: Build app bundle
        run: ./script/build_and_run.sh --bundle-only

      - name: Package DMG
        run: ./script/package_dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrailShot-dev-dmg
          path: dist/TrailShot.dmg
          if-no-files-found: error
